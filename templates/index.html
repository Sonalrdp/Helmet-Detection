<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helmet Detection</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: Inter, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .video-card {
            background: #111827;
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .card-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .card-header p {
            margin-top: 4px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .badge.online  { background: rgba(34,197,94,0.18);  color: #a7f3d0; }
        .badge.offline { background: rgba(239,68,68,0.18);  color: #fecaca; }

        .video-preview {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            background: #020617;
            border-radius: 18px;
            padding: 14px;
            min-height: 400px;
        }

        .video-preview video,
        .video-preview img {
            width: 100%;
            height: 100%;
            border-radius: 14px;
            object-fit: cover;
            background: #020617;
            display: block;
        }

        .label-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            padding: 0 4px;
        }

        .label-row span {
            font-size: 0.82rem;
            color: #64748b;
            text-align: center;
        }

        @media (max-width: 600px) {
            .video-preview { grid-template-columns: 1fr; min-height: auto; }
            .label-row     { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="video-card">
        <div class="card-header">
            <div>
                <h1>Local Camera Preview</h1>
                <p>Raw webcam on the left &mdash; YOLO annotated output on the right.</p>
            </div>
            <div class="badge online" id="camera-status">Waiting&hellip;</div>
        </div>

        <div class="video-preview">
            <video id="webcamVideo" autoplay muted playsinline></video>
            <img id="annotatedFrame" alt="Annotated output" />
        </div>

        <div class="label-row">
            <span>Raw feed</span>
            <span>Annotated output</span>
        </div>
    </div>

    <script>
        const video       = document.getElementById('webcamVideo');
        const annotated   = document.getElementById('annotatedFrame');
        const statusBadge = document.getElementById('camera-status');

        async function initWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
                statusBadge.textContent = 'ONLINE';
                startFrameLoop();
            } catch (err) {
                statusBadge.textContent = 'DENIED';
                statusBadge.className   = 'badge offline';
                console.error('Camera error:', err);
            }
        }

        async function startFrameLoop() {
            const canvas = document.createElement('canvas');
            const ctx    = canvas.getContext('2d');

            async function sendFrame() {
                if (video.readyState < 2) { requestAnimationFrame(sendFrame); return; }

                canvas.width  = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);

                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.75));
                if (!blob) { requestAnimationFrame(sendFrame); return; }

                try {
                    const res = await fetch('/predict_frame', { method: 'POST', body: blob });
                    if (res.ok) annotated.src = URL.createObjectURL(await res.blob());
                } catch (e) {
                    console.error('Frame send error:', e);
                }

                setTimeout(sendFrame, 250);
            }

            sendFrame();
        }

        window.addEventListener('load', initWebcam);
    </script>
</body>
</html>
